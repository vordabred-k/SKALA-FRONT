    <style>
      audio {
        width: 100%;
        margin: 8px 0 4px;

      .trip-grid-containers {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));

      }

      .trip-card {
        margin: 0;
        background-color: var(--accent-soft);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .trip-card img {
        display: block;
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 8px;
      }
    </style>
